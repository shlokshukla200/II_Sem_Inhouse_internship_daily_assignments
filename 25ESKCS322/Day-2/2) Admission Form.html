<!DOCTYPE html>
<html>

<head>
    <title>Admission Form</title>
    <style>
        body {
            background-image: url('Images/BG.png');
            background-size: cover;

        }

        .admission {
            box-sizing: border-box;
            text-align: left;
            font-size: large;
            font-family: sans-serif;
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            margin-left: 425px;
            border-radius: 15px;
            padding: 20px 20px 20px 20px;
            width: 50%;
            height: 50%;
        }
    </style>
</head>

<body bgcolor="#FFF9E3">
    <u>
        <center>
            <h1>College Admission Form</h1>
        </center>
    </u>
    <div class="admission">
        <form>
            <h3><label>Name</label></h3>
            <input type="text" placeholder="Enter Name">
            <h3><label>Email</label></h3>
            <input type="email" placeholder="Enter Mail ID">
            <h3><label>Phone Number</label></h3>
            <input type="tel" placeholder="Enter phone Number">

            <h3><label>DOB</label></h3>
            <input type="date">
            <h3><label>Gender</label></h3>
            <input type="radio">Male
            <input type="radio">Female
            <h3><label>Desired Branch</label></h3>
            <input type="radio">CS
            <input type="radio">IT
            <input type="radio">EE
            <input type="radio">ME
            <h3><label>12th Marksheet</label></h3>
            <input type="file" placeholder="Upload File">
            <h3><label>Password</label></h3>
            <input type="password" placeholder="Enter password">
            <br><br>
            <input type="reset">
            <button id="myBtn" type="submit">Submit</button>

    </div>
    </form>
    <script>
    const btn = document.querySelector("#myBtn");
    btn.addEventListener("click", function(){
    let count = parseInt(btn.dataset.count || 0);
    count++;
    btn.dataset.count = count;
    document.querySelector("#display").textContent = `Clicks: ${count}`;
    });</script>    
</body>

</html>
